<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proserva — Reservation Engine</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- SETUP WIZARD -->
<div id="setup-wizard" style="display:none;">
  <div id="wizard-root"></div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none;">
  
  <!-- TOPBAR -->
  <div id="topbar"></div>

  <div id="app">
    
    <!-- SIDEBAR -->
    <nav id="sidebar"></nav>

    <!-- CONTENT -->
    <main id="content">

      <!-- CALENDAR VIEW -->
      <div id="view-calendar"></div>

      <!-- DETAIL VIEW -->
      <div id="view-detail"></div>

      <!-- MENUS VIEW -->
      <div id="view-menus"></div>

      <!-- LOCATIONS VIEW -->
      <div id="view-locations"></div>

      <!-- CUSTOMERS VIEW -->
      <div id="view-customers"></div>

      <!-- ANALYSIS VIEW -->
      <div id="view-analysis"></div>

      <!-- BROADCAST VIEW -->
      <div id="view-broadcast"></div>

    </main>

  </div>
</div>

<!-- MODALS ROOT -->
<div id="modal-root"></div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- MAIN JS -->
<script src="modules.js"></script>
<script src="app.js"></script>

</body>
</html>
